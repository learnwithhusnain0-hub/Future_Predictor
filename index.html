<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Scanner - See Your Future</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a0a0f;
            color: #f0f0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Background effects */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background-color: rgba(0, 150, 255, 0.3);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }

        /* Landing Page Content */
        .landing-content {
            text-align: center;
            padding: 30px 20px;
            width: 100%;
            animation: fadeIn 1.5s ease-out;
            z-index: 10;
        }

        .title {
            font-size: 4rem;
            background: linear-gradient(90deg, #00ffff, #0080ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.8rem;
            color: #a0a0ff;
            margin-bottom: 60px;
            max-width: 600px;
            line-height: 1.6;
        }

        .start-button {
            background: linear-gradient(45deg, #0080ff, #00ffff);
            border: none;
            padding: 25px 60px;
            font-size: 2rem;
            color: #000;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.7);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .start-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.9);
        }

        .start-button:active {
            transform: scale(0.98);
        }

        .start-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .start-button:hover::before {
            left: 100%;
        }

        .instructions {
            margin-top: 40px;
            color: #8888cc;
            max-width: 500px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-1000px) rotate(720deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2.8rem;
            }
            
            .subtitle {
                font-size: 1.4rem;
                margin-bottom: 40px;
            }
            
            .start-button {
                font-size: 1.6rem;
                padding: 20px 45px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2.2rem;
            }
            
            .subtitle {
                font-size: 1.2rem;
            }
            
            .start-button {
                font-size: 1.4rem;
                padding: 18px 35px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-effects" id="bgEffects"></div>
    
    <!-- Main Container -->
    <div class="container">
        <div class="landing-content">
            <h1 class="title">See Your Future</h1>
            <h2 class="subtitle">Scan to Reveal Your Destiny</h2>
            <button class="start-button" id="startButton">
                <i class="fas fa-fingerprint"></i> Start Authentication
            </button>
            
            <div class="instructions">
                <p><i class="fas fa-info-circle"></i> You will be guided through a biometric authentication process to access your future prediction.</p>
            </div>
        </div>
    </div>

    <!-- Audio element for background music -->
    <audio id="bgMusic" loop>
        <!-- Futuristic ambient music -->
        <source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3" type="audio/mpeg">
    </audio>

    <script>
        // DOM Elements
        const startButton = document.getElementById('startButton');
        const bgMusic = document.getElementById('bgMusic');
        const bgEffects = document.getElementById('bgEffects');

        // Create background particles
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size and position
                const size = Math.random() * 5 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                // Random animation duration and delay
                particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                bgEffects.appendChild(particle);
            }
        }

        // Initialize background music (muted initially)
        function initBackgroundMusic() {
            bgMusic.volume = 0.3;
            bgMusic.muted = true;
            
            // Unmute music on first user interaction
            document.addEventListener('click', function enableMusic() {
                if (bgMusic.muted) {
                    bgMusic.muted = false;
                    bgMusic.play().catch(e => console.log("Autoplay prevented:", e));
                }
                document.removeEventListener('click', enableMusic);
            }, { once: true });
        }

        // Start button click handler
        startButton.addEventListener('click', function() {
            // Play button click sound
            const clickSound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3');
            clickSound.volume = 0.3;
            clickSound.play().catch(e => console.log("Audio play failed:", e));
            
            // Add loading animation to button
            startButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing Scanner...';
            startButton.disabled = true;
            
            // Redirect to scanner page after short delay
            setTimeout(() => {
                window.location.href = 'scanner.html';
            }, 1000);
        });

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            initBackgroundMusic();
            
            // Add a subtle glow effect to the title
            const title = document.querySelector('.title');
            setInterval(() => {
                title.style.textShadow = `0 0 ${15 + Math.random() * 10}px rgba(0, 255, 255, ${0.4 + Math.random() * 0.3})`;
            }, 2000);
            
            // Add instructions for first-time users
            setTimeout(() => {
                if (!localStorage.getItem('futureScannerViewed')) {
                    alert("Welcome to Future Scanner!\n\nINSTRUCTIONS:\n1. Click 'Start Authentication'\n2. Wait for 5-second countdown on next page\n3. Click on the fingerprint graphic when prompted\n4. Your future will be revealed after authentication");
                    localStorage.setItem('futureScannerViewed', 'true');
                }
            }, 1000);
        });
    </script>
</body>
</html>
